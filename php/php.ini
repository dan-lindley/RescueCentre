; ------------------------------------------------------------
; Local Development PHP configuration
; ------------------------------------------------------------

; Show all errors and warnings
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Increase upload and post limits
upload_max_filesize = 50M
post_max_size = 50M

; Allow more memory and time for scripts
memory_limit = 512M
max_execution_time = 60

; Set timezone
date.timezone = Europe/London

; Enable short open tags if needed (WordPress often uses them)
short_open_tag = On

; Log errors to stdout so they appear in docker logs
log_errors = On
error_log = /dev/stderr

services:
  db:
    image: mariadb:10.11.14
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: supersecret
      MYSQL_DATABASE: local_rescue
      MYSQL_USER: user
      MYSQL_PASSWORD: db_pass
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./Database/00-seed.sh:/docker-entrypoint-initdb.d/00-seed.sh:ro
      - ./Database:/seed/Database:ro
    ports:
      - "3306:3306"

  web:
    build: ./php
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./Web:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    ports:
      - "8082:80"

  adminer:
    image: adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8080"

volumes:
  mariadb_data:
